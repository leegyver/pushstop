# pushstop.live 전용 server 블록
# /etc/nginx/sites-available/pushstop.conf 에 심볼릭 링크 생성 (기존 Nginx 설정에 영향 없음)

server {
    listen 80;
    server_name pushstop.live www.pushstop.live;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pushstop.live www.pushstop.live;

    # Let's Encrypt SSL (certbot --nginx -d pushstop.live -d www.pushstop.live 로 자동 구성 권장)
    # ssl_certificate /etc/letsencrypt/live/pushstop.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pushstop.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; frame-src https://www.google.com/recaptcha/; connect-src 'self' wss://pushstop.live;" always;

    # Next.js → 포트 4000
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket → 포트 4001
    location /ws {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Static cache
    location /_next/static {
        proxy_pass http://127.0.0.1:4000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
