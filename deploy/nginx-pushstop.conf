# pushstop.live 전용 server 블록
# /etc/nginx/sites-available/pushstop.conf 에 심볼릭 링크 생성 (기존 Nginx 설정에 영향 없음)

server {
    listen 80;
    server_name pushstop.live www.pushstop.live 1.234.53.82;

    # Let's Encrypt SSL will be configured later by certbot.
    # For now, serve traffic directly on port 80.

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; frame-src https://www.google.com/recaptcha/; connect-src 'self' wss://pushstop.live ws://1.234.53.82:4001 wss://1.234.53.82;" always;

    # Next.js → 포트 4000
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket → 포트 4001
    location /ws {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Static cache
    location /_next/static {
        proxy_pass http://127.0.0.1:4000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
